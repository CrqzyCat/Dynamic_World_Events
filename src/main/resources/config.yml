# ==========================================
#       Dynamic World Events - Config
# ==========================================

settings:
  # Mindestminuten zwischen Events
  min-interval-minutes: 20
  # Maximalminuten zwischen Events
  max-interval-minutes: 45
  # Mindestanzahl Online-Spieler für einen Event-Start
  min-players: 1
  # Vorwarnung X Sekunden vor dem Event
  warning-seconds: 30

events:
  meteor:
    enabled: true
    weight: 20
    duration-seconds: 60
    meteor-count: 5
    explosion-power: 2.5

  invasion:
    enabled: true
    weight: 25
    duration-seconds: 120
    mob-count: 15
    mob-type: ZOMBIE
    give-armor: true
    give-weapons: true

  trader_caravan:
    enabled: true
    weight: 30
    duration-seconds: 180
    trader-count: 3

  drought:
    enabled: true
    weight: 15
    duration-seconds: 300
    stop-rain: true

  treasure_hunt:
    enabled: true
    weight: 10
    duration-seconds: 240
    chest-count: 3
    rewards:
      - DIAMOND:2
      - GOLD_INGOT:4
      - IRON_INGOT:6
      - EMERALD:2
      - EXPERIENCE_BOTTLE:3

messages:
  prefix: "&8[&6DWE&8] &r"
  event-warning: "&eWarnung! &7Ein Ereignis beginnt in &e{seconds} Sekunden&7!"
  event-start: "&6&lEreignis gestartet: &f{event}"
  event-end: "&aEreignis beendet: &f{event}"
  no-active-event: "&7Aktuell kein aktives Ereignis."
  next-event: "&7Nächstes Ereignis in ca. &e{minutes} Minuten&7."
