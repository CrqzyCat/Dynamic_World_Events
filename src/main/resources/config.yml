# ==========================================
#       Dynamic World Events - Config
# ==========================================

settings:
  min-interval-minutes: 20
  max-interval-minutes: 45
  min-players: 1
  warning-seconds: 30

events:
  meteor:
    enabled: true
    weight: 20
    duration-seconds: 60
    meteor-count: 5
    explosion-power: 2.5

  invasion:
    enabled: true
    weight: 25
    duration-seconds: 120
    mob-count: 15
    mob-type: ZOMBIE
    give-armor: true
    give-weapons: true

  trader_caravan:
    enabled: true
    weight: 30
    duration-seconds: 180
    trader-count: 3

  drought:
    enabled: true
    weight: 15
    duration-seconds: 300
    stop-rain: true

  treasure_hunt:
    enabled: true
    weight: 10
    duration-seconds: 240
    chest-count: 3
    rewards:
      - DIAMOND:2
      - GOLD_INGOT:4
      - IRON_INGOT:6
      - EMERALD:2
      - EXPERIENCE_BOTTLE:3

  blood_moon:
    enabled: true
    weight: 8
    duration-seconds: 600

discord:
  webhook-url: "YOUR_WEBHOOK_URL_HERE"
  server-name: "My Server"

messages:
  prefix: "&8[&6DWE&8] &r"
  event-warning: "&eWarning! &7An event starts in &e{seconds}s&7!"
  event-start: "&6&lEvent started: &f{event}"
  event-end: "&aEvent ended: &f{event}"
  no-active-event: "&7No active event right now."
  next-event: "&7Next event in approx. &e{minutes} min&7."

  thunderstorm:
    enabled: true
    weight: 18
    duration-seconds: 180
    # Ticks between lightning strikes (20 ticks = 1 second)
    strike-interval-ticks: 60
    # If true, lightning deals damage and can start fires. If false, visual only.
    damaging-strikes: false

  haunting:
    enabled: true
    weight: 12
    duration-seconds: 240
    # Phantoms spawned per player at the start
    phantoms-per-player: 2
    # Ticks between additional phantom waves
    spawn-interval-ticks: 100
    # Phantom size (1 = normal, 2 = large, 3 = huge)
    phantom-size: 2

  bountiful_harvest:
    enabled: true
    weight: 15
    duration-seconds: 300
    # Double crop drops when harvesting during the event
    double-drops: true

# ==========================================
#       Fixed Event Schedule (optional)
# ==========================================
# If enabled, events fire at specific real-world times every day.
# The random scheduler still runs alongside this — both are independent.
# Use "random" as the event ID to trigger a weighted random event.
schedule:
  enabled: false
  entries:
    - time: "20:00"
      event: blood_moon
    - time: "12:00"
      event: trader_caravan
    - time: "08:00"
      event: random

# ==========================================
#       Per-World Config (optional)
# ==========================================
# Configure events per world. If a world has no entry here,
# all events are allowed using the global settings above.
#
# worlds:
#   world:                        # Main survival world — all events allowed
#     enabled: true
#     min-interval-minutes: 15
#     max-interval-minutes: 30
#
#   world_nether:                 # Nether — only invasion and blood moon
#     enabled: true
#     allowed-events:
#       - invasion
#       - blood_moon
#
#   world_the_end:                # End — events disabled entirely
#     enabled: false
#
#   creative_world:               # Creative — no dangerous events
#     enabled: true
#     disabled-events:
#       - invasion
#       - blood_moon
#       - meteor
#       - haunting

# ==========================================
#       Seasonal Weight Modifiers
# ==========================================
# Multiplies event weights during specific date ranges (MM-dd format).
# 2.0 = twice as likely, 0.5 = half as likely, 3.0 = three times as likely.
# Multiple seasons can overlap — modifiers stack multiplicatively.
# Seasons wrap around year boundaries (e.g. Dec 01 → Jan 06).

seasonal:
  enabled: true
  seasons:
    halloween:
      start: "10-01"
      end:   "11-01"
      modifiers:
        haunting:    3.0
        blood_moon:  2.0
        drought:     0.2
        bountiful_harvest: 0.3

    winter:
      start: "12-01"
      end:   "01-06"
      modifiers:
        treasure_hunt:   2.5
        trader_caravan:  2.0
        drought:         0.1
        thunderstorm:    0.3

    spring:
      start: "03-20"
      end:   "06-21"
      modifiers:
        bountiful_harvest: 3.0
        drought:           0.5
        trader_caravan:    1.5

    summer:
      start: "06-21"
      end:   "09-22"
      modifiers:
        drought:           2.5
        thunderstorm:      2.0
        bountiful_harvest: 1.5

# ==========================================
#       Event Chains
# ==========================================
# When an event ends naturally, it can trigger a follow-up event after a delay.
# Forced stops (/dwe stop) never trigger chains.
# chance: probability 0.0-1.0 that the chain fires (1.0 = always)

chains:
  enabled: true
  entries:
    blood_moon_to_haunting:
      trigger: blood_moon
      next:    haunting
      delay-minutes: 1440
      chance:  0.75
      announce: true
      announce-message: "&5The spirits stirred by last night's Blood Moon grow restless..."

    invasion_aftermath:
      trigger: invasion
      next:    blood_moon
      delay-minutes: 60
      chance:  0.3
      announce: true
      announce-message: "&cThe invasion has drawn something darker from the shadows..."

    drought_to_thunderstorm:
      trigger: drought
      next:    thunderstorm
      delay-minutes: 30
      chance:  0.5
      announce: true
      announce-message: "&bThe long drought breaks — a violent storm is building on the horizon."

# ==========================================
#       Voting System
# ==========================================
voting:
  enabled: true
  # How long the vote stays open (seconds)
  duration-seconds: 60
  # Number of event options presented to players (2-4)
  options: 3
  # Broadcast vote options in chat
  announce-in-chat: true

# ==========================================
#       Event History
# ==========================================
history:
  # Maximum number of past events to remember
  max-entries: 20
