name: Dynamic_World_Events
version: '${version}'
main: dynamic_world_events.dynamic_World_Events.Dynamic_World_Events
api-version: '1.21'
load: POSTWORLD
description: Dynamic server-wide world events for Paper SMPs
authors: [ YourName ]

commands:
  dwe:
    description: All DynamicWorldEvents commands
    usage: /dwe <events|bossbar|start|stop|reload>

permissions:
  dwe.events.list:
    description: View event info and use /dwe bossbar
    default: true
  dwe.admin.start:
    description: Manually start events
    default: op
  dwe.admin.stop:
    description: Stop events
    default: op
  dwe.admin.reload:
    description: Reload config
    default: op
