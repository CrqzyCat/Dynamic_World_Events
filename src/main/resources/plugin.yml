name: Dynamic_World_Events
version: '${version}'
main: dynamic_world_events.dynamic_World_Events.Dynamic_World_Events
api-version: '1.21'
load: POSTWORLD
description: Dynamic server-wide world events for Paper SMPs
authors: [ YourName ]

commands:
  events:
    description: Show current and next event
    usage: /events
    permission: dwe.events.list
  eventstart:
    description: Manually start an event
    usage: /eventstart [event-id]
    permission: dwe.admin.start
  eventstop:
    description: Stop the current event
    usage: /eventstop
    permission: dwe.admin.stop
  eventreload:
    description: Reload the config
    usage: /eventreload
    permission: dwe.admin.reload
  dwe:
    description: Player settings for DynamicWorldEvents
    usage: /dwe <bossbar>
    permission: dwe.events.list

permissions:
  dwe.events.list:
    description: View event info and use /dwe
    default: true
  dwe.admin.start:
    description: Manually start events
    default: op
  dwe.admin.stop:
    description: Stop events
    default: op
  dwe.admin.reload:
    description: Reload config
    default: op
